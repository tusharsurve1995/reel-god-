<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REEL GOD — Authentication Required</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 0;
        }
        .login-box {
            width: 100%;
            max-width: 420px;
            text-align: center;
            animation: fadeIn 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
        }
        .login-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
        }
        .login-logo {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 3px;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .login-subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        .form-label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }
        .form-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.25s ease;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.15);
            background: rgba(255, 255, 255, 0.05);
        }
        .btn-login {
            width: 100%;
            padding: 0.75rem;
            font-size: 1rem;
            justify-content: center;
            margin-top: 1rem;
        }
        .error-message {
            color: var(--accent-red);
            font-size: 0.85rem;
            margin-top: 1rem;
            font-weight: 500;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="glass-panel login-box">
        <div class="login-logo">🤖 REEL GOD</div>
        <div class="login-subtitle">COMMANDER ACCESS PORTAL</div>
        
        <form method="POST" action="/login">
            <div class="form-group">
                <label class="form-label" for="password">Commander Password</label>
                <input class="form-input" type="password" id="password" name="password" placeholder="Enter secure key..." required autocomplete="current-password" autofocus>
            </div>
            
            <button class="btn btn-approve btn-login" type="submit">
                ⚡ Authenticate
            </button>
        </form>
        
        {% if error %}
        <div class="error-message">
            ❌ Invalid authentication credentials.
        </div>
        {% endif %}
    </div>
</body>
</html>
